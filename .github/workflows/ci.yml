name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    # Env vars are required at job level so postinstall (prisma generate) has DATABASE_URL
    # available during npm ci — the env() helper in prisma.config.ts throws if it is missing.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      BETTER_AUTH_SECRET: "ci-secret-for-build"
      NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"
      # Opt into Node.js 24 for all actions now — Node.js 20 actions are deprecated
      # and will be forced to Node.js 24 by default from June 2nd, 2026.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npx next build

